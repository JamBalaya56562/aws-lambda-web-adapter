name: Changelog

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to generate changelog for (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    env:
      VERSION_TAG: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --tag ${{ env.VERSION_TAG }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open changelog pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: changelog/${{ env.VERSION_TAG }}
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is already up to date; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git switch -C "$BRANCH"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${VERSION_TAG}"
          git push --force origin "$BRANCH"

          if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -qx OPEN; then
            echo "An open PR for $BRANCH already exists; it now points at the new commit."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update changelog for ${VERSION_TAG}" \
              --body "Automated changelog update for ${VERSION_TAG}, generated by git-cliff."
          fi

      - name: Create/update GitHub release body
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
